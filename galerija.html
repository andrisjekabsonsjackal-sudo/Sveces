<div id="candle-gallery" style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;"></div>

<script>
  const gallery = document.getElementById('candle-gallery');
  
  // Šis cikls izies cauri numuriem no 1 līdz 28
  for (let i = 1; i <= 28; i++) {
    gallery.innerHTML += `
      <div class="candle-card" style="width: 250px; border: 1px solid #eee; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <img src="amberflames_${i}.jpg" alt="Amber & Flames Svece ${i}" style="width: 100%; height: auto; border-radius: 5px;">
        <h3 style="margin-top: 10px; font-family: sans-serif; color: #333;">Luksusa Svece Nr. ${i}</h3>
        <p style="color: #666; font-family: sans-serif;">Roku darbs</p>
      </div>
    `;
  }
</script>
